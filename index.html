<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>載入中...</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <!-- Iconify -->
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <!-- Anime.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans TC"', 'system-ui', 'sans-serif'] },
          borderRadius: { '4xl': '2rem', '5xl': '2.5rem' },
          backdropBlur: { xs: '2px' },
          boxShadow: {
            'glass': '0 8px 32px rgba(0,0,0,0.08)',
            'glass-lg': '0 16px 48px rgba(0,0,0,0.12)',
            'fab': '0 4px 20px rgba(0,0,0,0.15)'
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: "Noto Sans TC", system-ui, sans-serif; }

    /* 全域雜訊紋理 */
    .grain { position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.03; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }

    /* 滿版地圖 */
    #map { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }

    /* 玻璃擬態 */
    .glass { background: rgba(255,255,255,0.72); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); }
    .glass-dark { background: rgba(0,0,0,0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }

    /* 圓角系統 */
    .radius-sm { border-radius: 12px; }
    .radius-md { border-radius: 16px; }
    .radius-lg { border-radius: 20px; }
    .radius-xl { border-radius: 24px; }
    .radius-full { border-radius: 9999px; }

    /* 懸浮搜尋卡 */
    .search-card { position: absolute; top: 16px; left: 16px; right: 16px; z-index: 20; max-width: 560px; margin: 0 auto; }
    @media (min-width: 768px) { .search-card { left: 24px; right: auto; } }

    /* 懸浮 FAB 群 */
    .fab-group { position: absolute; z-index: 30; display: flex; flex-direction: column; gap: 12px; }
    .fab-group.right { bottom: 24px; right: 16px; }
    .fab-group.left { bottom: 24px; left: 16px; }
    .fab { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .fab:hover { transform: scale(1.06); box-shadow: 0 6px 24px rgba(0,0,0,0.2); }
    .fab-primary { background: rgba(16, 185, 129, 0.9); color: white; }
    .fab-glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); color: #334155; }

    /* 側邊表單面板 */
    .panel-overlay { position: fixed; inset: 0; z-index: 50; pointer-events: none; }
    .panel-overlay.active { pointer-events: auto; }
    .panel-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s; }
    .panel-overlay.active .panel-backdrop { opacity: 1; }
    .panel-drawer { position: absolute; top: 0; right: 0; width: 100%; max-width: 420px; height: 100%; background: white; box-shadow: -8px 0 40px rgba(0,0,0,0.12); transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; }
    .panel-overlay.active .panel-drawer { transform: translateX(0); }
    @media (min-width: 768px) { .panel-drawer { max-width: 440px; } }

    /* 圖例 */
    .map-legend { position: absolute; bottom: 24px; left: 16px; z-index: 25; }
    .map-legend .glass { padding: 12px 16px; }

    /* 提示 */
    .map-hint { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 15; transition: opacity 0.3s; }
    .map-hint.hidden { opacity: 0; pointer-events: none; }

    /* Toast */
    .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-20px); z-index: 100; padding: 14px 24px; border-radius: 14px; font-weight: 500; opacity: 0; transition: all 0.35s; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Loading */
    .loading-overlay { position: fixed; inset: 0; z-index: 200; background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.4s; }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner-ring { width: 48px; height: 48px; border: 4px solid #d1fae5; border-top-color: #10b981; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Place Autocomplete */
    .search-wrapper gmp-place-autocomplete, .search-wrapper [id="placeAutocompleteInput"] { width: 100%; display: block; }
    .pac-container { border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.15); border: none; margin-top: 8px; }
    .pac-item { padding: 12px 16px; font-size: 14px; }

    /* 表單樣式 */
    .field-input, .field-textarea { border-radius: 12px; border: 1.5px solid #e2e8f0; transition: border-color 0.2s, box-shadow 0.2s; }
    .field-input:focus, .field-textarea:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.15); }
    .cat-btn { border-radius: 20px; padding: 8px 18px; font-weight: 500; transition: all 0.2s; }
    .star-rating .star { cursor: pointer; transition: transform 0.15s; }
    .star-rating .star:hover { transform: scale(1.15); }
    .info-content { font-size: 13px; max-width: 280px; }
    .info-btn { border-radius: 10px; padding: 8px 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .panel-header.edit-mode { background: rgba(16,185,129,0.08); border-bottom-color: rgba(16,185,129,0.2); }
  </style>
</head>
<body class="bg-slate-100">
  <div class="grain"></div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-ring"></div>
    <span class="text-slate-600 font-medium">載入地圖中...</span>
  </div>

  <!-- 滿版地圖 -->
  <div id="map"></div>

  <!-- 懸浮搜尋卡 -->
  <div class="search-card glass radius-xl shadow-glass" id="searchCard">
    <div class="p-4">
      <div class="flex items-center justify-between gap-3 mb-3">
        <h1 class="text-lg font-bold text-slate-800 truncate" id="headerTitle">友善地圖</h1>
        <span class="text-sm text-slate-500 shrink-0" id="headerStats">0 筆</span>
      </div>
      <div class="search-wrapper">
        <input type="text" id="searchInput" class="field-input w-full py-3 px-4 bg-slate-50/80" placeholder="輸入店名或地址搜尋...">
      </div>
      <p class="text-xs text-slate-500 mt-2">選擇結果或點擊地圖選擇位置</p>
    </div>
  </div>

  <!-- 地圖提示 -->
  <div class="map-hint glass-dark radius-lg px-5 py-3 text-white text-sm" id="mapHint">搜尋店家或點擊地圖選擇位置</div>

  <!-- 圖例（已隱藏） -->
  <div class="map-legend glass radius-lg shadow-glass hidden" id="mapLegend"></div>

  <!-- FAB：定位 + 選單 -->
  <div class="fab-group right">
    <button class="fab fab-glass shadow-fab" id="fabLocate" title="定位到我的位置">
      <iconify-icon icon="solar:target-bold" width="24" height="24"></iconify-icon>
    </button>
    <button class="fab fab-glass shadow-fab" id="fabMenu" title="可見店家列表">
      <iconify-icon icon="solar:hamburger-menu-bold" width="24" height="24"></iconify-icon>
    </button>
  </div>

  <!-- FAB：新增 -->
  <button class="fab fab-primary shadow-fab fab-group left" id="fabAdd" title="新增店家">
    <iconify-icon icon="solar:pen-bold" width="24" height="24"></iconify-icon>
  </button>

  <!-- 側邊表單面板 -->
  <div class="panel-overlay" id="panelOverlay">
    <div class="panel-backdrop" id="panelBackdrop"></div>
    <div class="panel-drawer">
      <div class="panel-header glass sticky top-0 z-10 p-4 flex items-center justify-between border-b border-slate-200/50">
        <h2 class="text-lg font-bold text-slate-800" id="panelTitle">新增店家</h2>
        <button class="p-2 rounded-xl hover:bg-slate-100 transition-colors" id="panelClose" title="關閉">
          <iconify-icon icon="solar:close-circle-bold" width="24" height="24" class="text-slate-500"></iconify-icon>
        </button>
      </div>
      <!-- 可見店家列表（右下選單按鈕開啟） -->
      <div class="panel-body p-5 hidden" id="panelListBody">
        <p class="text-sm text-slate-500 mb-4">目前地圖範圍內的店家</p>
        <div id="visibleShopsList" class="space-y-4 max-h-[70vh] overflow-y-auto"></div>
      </div>
      <div class="panel-body p-5" id="panelFormBody">
        <form id="dataForm" novalidate>
          <p class="text-sm text-slate-500 mb-4">使用上方搜尋列或點擊地圖選擇位置</p>
          <div class="field-group mb-4">
            <label class="field-label block text-sm font-semibold text-slate-700 mb-2">選擇位置 <span class="text-emerald-500">*</span></label>
            <div class="flex gap-2">
              <input type="text" id="fieldLat" class="field-input flex-1 py-2.5 px-3 bg-slate-50" placeholder="緯度" readonly>
              <input type="text" id="fieldLng" class="field-input flex-1 py-2.5 px-3 bg-slate-50" placeholder="經度" readonly>
            </div>
          </div>
          <div class="field-group mb-4">
            <label class="field-label block text-sm font-semibold text-slate-700 mb-2" for="fieldName">店名 <span class="text-emerald-500">*</span></label>
            <input type="text" id="fieldName" class="field-input w-full py-2.5 px-3" placeholder="請輸入店家名稱" required>
          </div>
          <div class="field-group mb-4">
            <label class="field-label block text-sm font-semibold text-slate-700 mb-2" for="fieldAddress">地址</label>
            <input type="text" id="fieldAddress" class="field-input w-full py-2.5 px-3" placeholder="自動帶入或手動輸入">
          </div>
          <div class="field-group mb-4">
            <label class="field-label block text-sm font-semibold text-slate-700 mb-2">類別 <span class="text-emerald-500">*</span></label>
            <div class="category-btns flex flex-wrap gap-2" id="categoryBtns"></div>
            <input type="hidden" id="fieldCategory" required>
          </div>
          <div class="field-group mb-4">
            <label class="field-label block text-sm font-semibold text-slate-700 mb-2">無障礙設施</label>
            <div class="checkbox-grid grid grid-cols-2 gap-2" id="accessibilityGrid"></div>
          </div>
          <div class="field-group mb-4">
            <label class="field-label block text-sm font-semibold text-slate-700 mb-2">體驗評分 <span class="text-emerald-500">*</span></label>
            <div class="star-rating flex gap-1" id="starRating">
              <span class="star text-2xl text-slate-300" data-value="1">★</span>
              <span class="star text-2xl text-slate-300" data-value="2">★</span>
              <span class="star text-2xl text-slate-300" data-value="3">★</span>
              <span class="star text-2xl text-slate-300" data-value="4">★</span>
              <span class="star text-2xl text-slate-300" data-value="5">★</span>
            </div>
            <input type="hidden" id="fieldRating" required>
          </div>
          <div class="field-group mb-4">
            <label class="field-label block text-sm font-semibold text-slate-700 mb-2" for="fieldExperience">實際體驗心得</label>
            <textarea id="fieldExperience" class="field-textarea w-full py-2.5 px-3 min-h-[88px]" placeholder="請描述你的實際體驗..."></textarea>
          </div>
          <div class="field-group mb-5">
            <label class="field-label block text-sm font-semibold text-slate-700 mb-2" for="fieldReporter">回報者名稱</label>
            <input type="text" id="fieldReporter" class="field-input w-full py-2.5 px-3" placeholder="你的名字（選填）">
          </div>
          <button type="submit" class="w-full py-3.5 rounded-xl font-semibold text-white bg-emerald-500 hover:bg-emerald-600 transition-colors" id="submitBtn">送出資料</button>
          <button type="button" class="w-full py-3 mt-3 rounded-xl font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors hidden" id="cancelBtn" onclick="window._cancelEdit()">取消編輯</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast rounded-xl font-medium" id="toast"></div>

  <script>
  (function(){
    "use strict";
    let config=null,map=null,markers=[],tempMarker=null,infoWindow=null,selectedRating=0,allData=[],placeAutocompleteEl=null,editingItem=null;

    function showToast(msg,type){
      const t=document.getElementById("toast");
      t.textContent=msg;
      t.className="toast rounded-xl font-medium "+(type==="success"?"bg-emerald-500":"bg-rose-500")+" text-white";
      void t.offsetWidth;
      t.classList.add("show");
      setTimeout(()=>t.classList.remove("show"),3500);
    }
    function escapeHtml(str){const d=document.createElement("div");d.textContent=str||"";return d.innerHTML;}

    function createPinIcon(color,emoji){
      const svg='<svg xmlns="http://www.w3.org/2000/svg" width="40" height="52" viewBox="0 0 40 52"><defs><filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.3)"/></filter></defs><path d="M20 50 C20 50 3 30 3 18 C3 8.6 10.6 1 20 1 C29.4 1 37 8.6 37 18 C37 30 20 50 20 50Z" fill="'+color+'" stroke="#fff" stroke-width="2" filter="url(#s)"/><circle cx="20" cy="18" r="11" fill="#fff" opacity="0.9"/><text x="20" y="23" text-anchor="middle" font-size="14">'+emoji+'</text></svg>';
      return{url:"data:image/svg+xml;charset=UTF-8,"+encodeURIComponent(svg),scaledSize:new google.maps.Size(40,52),anchor:new google.maps.Point(20,52)};
    }
    function createTempPinIcon(){
      const svg='<svg xmlns="http://www.w3.org/2000/svg" width="40" height="52" viewBox="0 0 40 52"><defs><filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.3)"/></filter></defs><path d="M20 50 C20 50 3 30 3 18 C3 8.6 10.6 1 20 1 C29.4 1 37 8.6 37 18 C37 30 20 50 20 50Z" fill="#10b981" stroke="#fff" stroke-width="2" filter="url(#s)"/><circle cx="20" cy="18" r="11" fill="#fff" opacity="0.9"/><text x="20" y="23" text-anchor="middle" font-size="14">📍</text></svg>';
      return{url:"data:image/svg+xml;charset=UTF-8,"+encodeURIComponent(svg),scaledSize:new google.maps.Size(40,52),anchor:new google.maps.Point(20,52)};
    }

    async function loadConfig(){
      try{
        const res=await fetch("config.json");
        if(!res.ok)throw new Error("無法載入設定檔");
        config=await res.json();
        document.title=config.projectName||"友善地圖";
        document.getElementById("headerTitle").textContent=config.projectName;
        initUI();
        loadGoogleMaps();
      }catch(err){
        document.getElementById("loadingOverlay").innerHTML='<strong class="text-rose-500">載入設定檔失敗</strong><p class="text-slate-500">請確認 config.json 是否存在</p>';
      }
    }

    function initUI(){
      const catContainer=document.getElementById("categoryBtns");
      config.categories.forEach(cat=>{
        const btn=document.createElement("button");
        btn.type="button";
        btn.className="cat-btn border-2 border-slate-200 bg-white hover:border-slate-300";
        btn.textContent=(cat.emoji||"")+" "+cat.label;
        btn.dataset.value=cat.value;
        btn.dataset.color=cat.color;
        btn.addEventListener("click",function(){
          catContainer.querySelectorAll(".cat-btn").forEach(b=>{b.classList.remove("border-emerald-500","bg-emerald-50");b.style.background="";});
          btn.classList.add("border-emerald-500","bg-emerald-50");btn.style.background=cat.color;btn.style.borderColor=cat.color;
          document.getElementById("fieldCategory").value=cat.value;
        });
        catContainer.appendChild(btn);
      });
      config.accessibilityOptions.forEach(opt=>{
        const label=document.createElement("label");
        label.className="flex items-center gap-2 text-sm cursor-pointer p-2 rounded-lg hover:bg-slate-50";
        label.innerHTML='<input type="checkbox" value="'+escapeHtml(opt)+'" class="rounded"> '+escapeHtml(opt);
        document.getElementById("accessibilityGrid").appendChild(label);
      });
      document.querySelectorAll("#starRating .star").forEach(star=>{
        star.addEventListener("click",()=>{selectedRating=parseInt(star.dataset.value);document.getElementById("fieldRating").value=selectedRating;updateStars();});
      });
      document.getElementById("fabMenu").addEventListener("click",()=>openListPanel());
      document.getElementById("fabAdd").addEventListener("click",()=>openFormPanel());
      document.getElementById("panelClose").addEventListener("click",()=>closePanel());
      document.getElementById("panelBackdrop").addEventListener("click",()=>closePanel());
      document.getElementById("fabLocate").addEventListener("click",()=>{
        if(navigator.geolocation){
          navigator.geolocation.getCurrentPosition(p=>{map.setCenter({lat:p.coords.latitude,lng:p.coords.longitude});map.setZoom(16);showToast("已定位","success");},()=>showToast("無法取得位置","error"));
        }else showToast("不支援定位","error");
      });
      document.getElementById("dataForm").addEventListener("submit",handleSubmit);
    }
    function updateStars(){
      document.querySelectorAll("#starRating .star").forEach(s=>{
        s.classList.toggle("text-amber-400",parseInt(s.dataset.value)<=selectedRating);
        s.classList.toggle("text-slate-300",parseInt(s.dataset.value)>selectedRating);
      });
    }
    function openPanel(){document.getElementById("panelOverlay").classList.add("active");}
    function closePanel(){document.getElementById("panelOverlay").classList.remove("active");}
    function openFormPanel(){
      document.getElementById("panelListBody").classList.add("hidden");
      document.getElementById("panelFormBody").classList.remove("hidden");
      document.getElementById("panelTitle").textContent="新增店家";
      openPanel();
    }
    function openListPanel(){
      document.getElementById("panelFormBody").classList.add("hidden");
      document.getElementById("panelListBody").classList.remove("hidden");
      document.getElementById("panelTitle").textContent="可見店家";
      renderVisibleShopsList();
      openPanel();
    }
    function formatDate(ts){
      if(!ts)return"—";
      const d=new Date(ts);
      if(isNaN(d.getTime()))return ts;
      const pad=n=>String(n).padStart(2,"0");
      return d.getFullYear()+"/"+pad(d.getMonth()+1)+"/"+pad(d.getDate());
    }
    function getVisibleShops(){
      const b=map.getBounds();
      if(!b)return[];
      return allData.filter(item=>{
        const lat=parseFloat(item.lat),lng=parseFloat(item.lng);
        if(isNaN(lat)||isNaN(lng))return false;
        return b.contains({lat,lng});
      });
    }
    function renderVisibleShopsList(){
      const list=document.getElementById("visibleShopsList");
      const items=getVisibleShops();
      if(items.length===0){list.innerHTML='<p class="text-slate-500 text-sm py-4">目前地圖範圍內沒有店家</p>';return;}
      let html="";
      items.forEach(item=>{
        const catConfig=config.categories.find(c=>c.value===item.category);
        const emoji=catConfig?catConfig.emoji||catConfig.label:"📍";
        const stars="★".repeat(parseInt(item.rating)||0)+"☆".repeat(5-(parseInt(item.rating)||0));
        html+='<div class="shop-card p-4 rounded-xl bg-slate-50 border border-slate-200/80 hover:border-emerald-200 transition-colors cursor-pointer" data-id="'+escapeHtml(item.id||"")+'">';
        html+='<div class="flex items-start justify-between gap-2 mb-1"><h3 class="font-bold text-slate-800">'+emoji+' '+escapeHtml(item.shopName||"")+'</h3><span class="text-xs text-slate-400 shrink-0">'+formatDate(item.timestamp)+'</span></div>';
        if(item.address)html+='<div class="text-sm text-slate-600 mb-1">'+escapeHtml(item.address)+"</div>";
        html+='<div class="text-amber-400 text-sm mb-1">'+stars+"</div>";
        if(item.experience)html+='<div class="text-slate-600 text-sm">'+escapeHtml(item.experience)+"</div>";
        if(item.reporter)html+='<div class="text-xs text-slate-400 mt-1">回報者：'+escapeHtml(item.reporter)+"</div>";
        html+="</div>";
      });
      list.innerHTML=html;
      list.querySelectorAll(".shop-card[data-id]").forEach(el=>{
        const id=el.dataset.id;
        if(!id)return;
        el.addEventListener("click",()=>window._startEdit(id));
      });
    }

    function loadGoogleMaps(){
      const s=document.createElement("script");
      s.src="https://maps.googleapis.com/maps/api/js?key="+config.googleMapsApiKey+"&loading=async&callback=initMap";
      s.async=true;s.defer=true;document.head.appendChild(s);
    }

    window.initMap=async function(){
      const center=config.mapCenter||{lat:25.033,lng:121.565};
      map=new google.maps.Map(document.getElementById("map"),{
        center,zoom:config.mapZoom||13,mapTypeControl:false,streetViewControl:false,fullscreenControl:true,
        styles:[
          {featureType:"administrative",elementType:"labels.text.fill",stylers:[{color:"#5a5a5a"}]},
          {featureType:"landscape",elementType:"geometry.fill",stylers:[{color:"#f7f5f3"}]},
          {featureType:"landscape",elementType:"labels",stylers:[{visibility:"off"}]},
          {featureType:"poi",elementType:"all",stylers:[{visibility:"simplified"}]},
          {featureType:"poi",elementType:"labels.text.fill",stylers:[{color:"#4a4a4a"}]},
          {featureType:"road",elementType:"all",stylers:[{saturation:-100},{lightness:50},{color:"#e8e6e2"}]},
          {featureType:"road",elementType:"labels",stylers:[{visibility:"off"}]},
          {featureType:"road",elementType:"labels.icon",stylers:[{visibility:"off"}]},
          {featureType:"road.highway",elementType:"all",stylers:[{visibility:"simplified"},{weight:0.81}]},
          {featureType:"road.highway",elementType:"geometry.fill",stylers:[{color:"#f0eeea"}]},
          {featureType:"road.arterial",elementType:"all",stylers:[{weight:0.75},{visibility:"simplified"}]},
          {featureType:"road.arterial",elementType:"geometry.fill",stylers:[{color:"#f0eeea"}]},
          {featureType:"road.arterial",elementType:"labels.icon",stylers:[{visibility:"off"}]},
          {featureType:"transit",elementType:"all",stylers:[{visibility:"off"}]},
          {featureType:"water",elementType:"all",stylers:[{color:"#a8d4e8"},{visibility:"on"}]}
        ]
      });
      infoWindow=new google.maps.InfoWindow();
      map.addListener("click",e=>placeTemporaryMarker(e.latLng));
      await initSearchBox();
      document.getElementById("loadingOverlay").classList.add("hidden");
      loadExistingData();
      if(typeof gsap!=="undefined")gsap.from(".search-card, .fab",{opacity:0,y:20,duration:0.6,stagger:0.1,ease:"power2.out"});
    };

    async function initSearchBox(){
      await google.maps.importLibrary("places");
      const searchWrapper=document.querySelector(".search-card .search-wrapper");
      if(!searchWrapper)return;
      const oldInput=document.getElementById("searchInput");
      if(oldInput)oldInput.remove();
      placeAutocompleteEl=new google.maps.places.PlaceAutocompleteElement({placeholder:"輸入店名或地址搜尋...",includedRegionCodes:["tw"]});
      placeAutocompleteEl.id="placeAutocompleteInput";
      searchWrapper.appendChild(placeAutocompleteEl);
      const onSelect=async function(ev){
        const pp=(ev.detail&&ev.detail.placePrediction)||ev.placePrediction;
        if(!pp)return;
        const place=pp.toPlace();
        await place.fetchFields({fields:["displayName","formattedAddress","location","viewport"]});
        const loc=place.location;
        if(!loc){showToast("找不到此地點","error");return;}
        const latLng=typeof loc.lat==="function"?{lat:loc.lat(),lng:loc.lng()}:loc;
        document.getElementById("fieldName").value=place.displayName||(pp.text&&pp.text.text)||"";
        document.getElementById("fieldAddress").value=place.formattedAddress||"";
        // 搜尋到位置後移動地圖：有 viewport 則 fitBounds，否則 panTo 並縮放
        if(place.viewport){
          const b=place.viewport;
          const ne=b.getNorthEast(),sw=b.getSouthWest();
          const spanLat=Math.abs(ne.lat()-sw.lat()),spanLng=Math.abs(ne.lng()-sw.lng());
          if(spanLat>0.05||spanLng>0.05)map.fitBounds(b,{top:80,right:24,bottom:80,left:24});
          else{map.panTo(latLng);if(map.getZoom()<16)map.setZoom(16);}
        }else{map.panTo(latLng);if(map.getZoom()<16)map.setZoom(16);}
        placeTemporaryMarker(latLng);
        if(placeAutocompleteEl&&placeAutocompleteEl.value!==undefined)placeAutocompleteEl.value="";
      };
      placeAutocompleteEl.addEventListener("gmp-placeselect",onSelect);
      placeAutocompleteEl.addEventListener("gmp-select",onSelect);
    }

    function placeTemporaryMarker(latLng){
      if(typeof latLng.lat==="number")latLng=new google.maps.LatLng(latLng.lat,latLng.lng);
      if(tempMarker)tempMarker.setPosition(latLng);
      else{
        tempMarker=new google.maps.Marker({position:latLng,map,draggable:true,animation:google.maps.Animation.DROP,icon:createTempPinIcon(),zIndex:999});
        tempMarker.addListener("dragend",()=>{updateCoordFields(tempMarker.getPosition());reverseGeocode(tempMarker.getPosition());});
      }
      updateCoordFields(latLng);
      reverseGeocode(latLng);
      document.getElementById("mapHint").classList.add("hidden");
      if(!window.matchMedia("(max-width:768px)").matches)openFormPanel();
    }
    function updateCoordFields(latLng){
      document.getElementById("fieldLat").value=latLng.lat().toFixed(6);
      document.getElementById("fieldLng").value=latLng.lng().toFixed(6);
    }
    function reverseGeocode(latLng){
      new google.maps.Geocoder().geocode({location:latLng},(results,status)=>{
        if(status==="OK"&&results[0]){
          const addr=document.getElementById("fieldAddress");
          if(!addr.value)addr.value=results[0].formatted_address;
        }
      });
    }

    function loadExistingData(){
      if(!config.googleScriptUrl||config.googleScriptUrl.includes("你的部署ID"))return;
      const cb="_mapDataCallback_"+Date.now();
      window[cb]=function(result){
        delete window[cb];
        const el=document.getElementById("jsonp-loader");
        if(el)el.remove();
        if(result.success&&result.data){allData=result.data;renderMarkers();document.getElementById("headerStats").textContent=allData.length+" 筆";}
      };
      const s=document.createElement("script");
      s.id="jsonp-loader";
      s.src=config.googleScriptUrl+"?callback="+cb;
      s.onerror=()=>{delete window[cb];s.remove();};
      document.head.appendChild(s);
    }

    function renderMarkers(){
      markers.forEach(m=>m.setMap(null));
      markers=[];
      allData.forEach(item=>{
        const lat=parseFloat(item.lat),lng=parseFloat(item.lng);
        if(isNaN(lat)||isNaN(lng))return;
        const catConfig=config.categories.find(c=>c.value===item.category);
        const color=catConfig?catConfig.color:"#888";
        const emoji=catConfig?catConfig.emoji||catConfig.label:"📍";
        const catLabel=catConfig?catConfig.label:item.category;
        const marker=new google.maps.Marker({position:{lat,lng},map,title:item.shopName,icon:createPinIcon(color,emoji)});
        marker.addListener("click",()=>{
          let starsHtml="";
          const rating=parseInt(item.rating)||0;
          for(let i=0;i<5;i++)starsHtml+=i<rating?"★":"☆";
          let html='<div class="info-content p-3"><h3 class="font-bold text-base mb-1">'+emoji+" "+escapeHtml(item.shopName)+"</h3>";
          html+='<span class="inline-block px-2 py-0.5 rounded text-xs text-white mb-2" style="background:'+color+'">'+escapeHtml(catLabel)+"</span>";
          if(item.address)html+='<div class="text-slate-600 text-sm mb-1">'+escapeHtml(item.address)+"</div>";
          html+='<div class="text-amber-400 mb-2">'+starsHtml+"</div>";
          if(item.accessibility)html+='<div class="text-slate-500 text-sm mb-1">'+escapeHtml(item.accessibility)+"</div>";
          if(item.experience)html+='<div class="text-slate-600 text-sm border-t border-slate-200 pt-2 mt-2">'+escapeHtml(item.experience)+"</div>";
          if(item.reporter)html+='<div class="text-xs text-slate-400 mt-1">回報者：'+escapeHtml(item.reporter)+"</div>";
          if(item.id){
            html+='<div class="flex gap-2 mt-3 pt-3 border-t border-slate-200"><button class="info-btn flex-1 bg-emerald-50 text-emerald-600 hover:bg-emerald-100" onclick="window._startEdit(\''+escapeHtml(item.id)+'\')">編輯</button>';
            html+='<button class="info-btn flex-1 bg-rose-50 text-rose-600 hover:bg-rose-100" onclick="window._deleteItem(\''+escapeHtml(item.id)+'\')">刪除</button></div>';
          }
          html+="</div>";
          infoWindow.setContent(html);
          infoWindow.open(map,marker);
        });
        markers.push(marker);
      });
    }

    function generateClientId(){
      const n=new Date();
      const pad=(x,l)=>String(x).padStart(l||2,"0");
      return n.getFullYear()+pad(n.getMonth()+1)+pad(n.getDate())+pad(n.getHours())+pad(n.getMinutes())+pad(n.getSeconds())+"_"+Math.random().toString(36).substr(2,6);
    }

    async function handleSubmit(e){
      e.preventDefault();
      const lat=document.getElementById("fieldLat").value,lng=document.getElementById("fieldLng").value;
      const shopName=document.getElementById("fieldName").value.trim(),category=document.getElementById("fieldCategory").value,rating=document.getElementById("fieldRating").value;
      if(!lat||!lng){showToast("請先搜尋或點選位置","error");return;}
      if(!shopName){showToast("請輸入店家名稱","error");return;}
      if(!category){showToast("請選擇類別","error");return;}
      if(!rating){showToast("請選擇評分","error");return;}
      let reporterVal=document.getElementById("fieldReporter").value.trim();
      if(!reporterVal){const d=new Date();const pad=n=>String(n).padStart(2,"0");reporterVal="回報者"+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());}
      const accChecked=[];document.querySelectorAll("#accessibilityGrid input:checked").forEach(cb=>accChecked.push(cb.value));
      const formData={lat,lng,shopName,address:document.getElementById("fieldAddress").value.trim(),category,accessibility:accChecked.join(", "),rating,experience:document.getElementById("fieldExperience").value.trim(),reporter:reporterVal};
      const isEditing=editingItem!==null;
      const btn=document.getElementById("submitBtn");
      btn.disabled=true;btn.textContent=isEditing?"更新中...":"送出中...";
      try{
        if(!config.googleScriptUrl||config.googleScriptUrl.includes("你的部署ID"))throw new Error("尚未設定 Google Apps Script URL");
        if(isEditing){
          formData._action="update";formData.id=editingItem.id;
          await fetch(config.googleScriptUrl,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(formData)});
          showToast("資料已更新","success");
          const idx=allData.findIndex(d=>d.id===editingItem.id);
          if(idx!==-1){formData.id=editingItem.id;formData.timestamp=editingItem.timestamp;allData[idx]=formData;}
        }else{
          formData.id=generateClientId();
          await fetch(config.googleScriptUrl,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(formData)});
          showToast("資料送出成功","success");
          allData.push(formData);
        }
        renderMarkers();
        document.getElementById("headerStats").textContent=allData.length+" 筆";
        resetForm();
      }catch(err){showToast(err.message||"操作失敗","error");}
      finally{btn.disabled=false;btn.textContent=isEditing?"更新資料":"送出資料";}
    }

    window._startEdit=function(id){
      const item=allData.find(d=>d.id===id);
      if(!item){showToast("找不到此筆資料","error");return;}
      editingItem=item;infoWindow.close();
      document.getElementById("panelListBody").classList.add("hidden");
      document.getElementById("panelFormBody").classList.remove("hidden");
      document.getElementById("panelTitle").textContent="編輯店家";
      document.querySelector(".panel-header").classList.add("edit-mode");
      document.getElementById("submitBtn").textContent="更新資料";
      document.getElementById("cancelBtn").classList.remove("hidden");
      openPanel();
      document.getElementById("fieldLat").value=item.lat||"";
      document.getElementById("fieldLng").value=item.lng||"";
      document.getElementById("fieldName").value=item.shopName||"";
      document.getElementById("fieldAddress").value=item.address||"";
      document.getElementById("fieldExperience").value=item.experience||"";
      document.getElementById("fieldReporter").value=item.reporter||"";
      document.getElementById("fieldCategory").value=item.category||"";
      document.querySelectorAll(".cat-btn").forEach(b=>{
        b.classList.remove("border-emerald-500","bg-emerald-50");b.style.background="";
        if(b.dataset.value===item.category){b.classList.add("border-emerald-500","bg-emerald-50");b.style.background=b.dataset.color;}
      });
      selectedRating=parseInt(item.rating)||0;
      document.getElementById("fieldRating").value=selectedRating;
      updateStars();
      const facilities=(item.accessibility||"").split(",").map(s=>s.trim());
      document.querySelectorAll("#accessibilityGrid input").forEach(cb=>{cb.checked=facilities.indexOf(cb.value)!==-1;});
      const lat=parseFloat(item.lat),lng=parseFloat(item.lng);
      if(!isNaN(lat)&&!isNaN(lng)){placeTemporaryMarker(new google.maps.LatLng(lat,lng));map.setCenter({lat,lng});if(map.getZoom()<15)map.setZoom(15);}
      document.getElementById("mapHint").classList.add("hidden");
    };

    window._deleteItem=function(id){
      if(!confirm("確定要刪除嗎？"))return;
      const item=allData.find(d=>d.id===id);
      if(!item){showToast("找不到此筆資料","error");return;}
      infoWindow.close();
      if(!config.googleScriptUrl||config.googleScriptUrl.includes("你的部署ID")){showToast("尚未設定 URL","error");return;}
      fetch(config.googleScriptUrl,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({_action:"delete",id})})
        .then(()=>{
          showToast("已刪除","success");
          allData=allData.filter(d=>d.id!==id);
          renderMarkers();
          document.getElementById("headerStats").textContent=allData.length+" 筆";
          if(editingItem&&editingItem.id===id)resetForm();
        })
        .catch(err=>showToast("刪除失敗","error"));
    };

    window._cancelEdit=function(){resetForm();showToast("已取消編輯","success");};

    function resetForm(){
      editingItem=null;
      document.getElementById("panelTitle").textContent="新增店家";
      document.querySelector(".panel-header").classList.remove("edit-mode");
      document.getElementById("submitBtn").textContent="送出資料";
      document.getElementById("cancelBtn").classList.add("hidden");
      document.getElementById("dataForm").reset();
      if(placeAutocompleteEl&&placeAutocompleteEl.value!==undefined)placeAutocompleteEl.value="";
      document.getElementById("fieldLat").value="";
      document.getElementById("fieldLng").value="";
      document.getElementById("fieldCategory").value="";
      document.getElementById("fieldRating").value="";
      selectedRating=0;
      updateStars();
      document.querySelectorAll(".cat-btn").forEach(b=>{b.classList.remove("border-emerald-500","bg-emerald-50");b.style.background="";});
      if(tempMarker){tempMarker.setMap(null);tempMarker=null;}
      document.getElementById("mapHint").classList.remove("hidden");
    }

    document.addEventListener("DOMContentLoaded",loadConfig);
  })();
  </script>
</body>
